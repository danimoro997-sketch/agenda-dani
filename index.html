<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Agenda">
<meta name="theme-color" content="#0a0a0a">
<title>Agenda · Dani</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --bg2: #111111;
    --bg3: #1a1a1a;
    --border: #222222;
    --text: #e8e4dc;
    --text2: #6b6760;
    --text3: #3a3835;
    --accent: #c9a96e;
    --accent2: #8b6b3d;
    --green: #4a7c59;
    --red: #8b3a3a;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; padding-top: var(--safe-top); padding-bottom: var(--safe-bottom); }
  .header { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .header-left { display: flex; flex-direction: column; gap: 2px; }
  .header-title { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--text); letter-spacing: -0.3px; }
  .header-date { font-size: 10px; color: var(--text2); letter-spacing: 0.8px; text-transform: uppercase; }
  .tab-switcher { display: flex; gap: 4px; background: var(--bg3); padding: 3px; border-radius: 10px; }
  .tab-btn { padding: 5px 12px; border-radius: 7px; border: none; background: transparent; color: var(--text2); font-family: 'DM Mono', monospace; font-size: 11px; cursor: pointer; transition: all 0.2s; letter-spacing: 0.3px; }
  .tab-btn.active { background: var(--bg); color: var(--accent); }
  .view { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  .view.active { display: flex; }
  .agenda-scroll { flex: 1; overflow-y: auto; padding: 16px 20px; }
  .agenda-scroll::-webkit-scrollbar { display: none; }
  .day-header { font-size: 10px; color: var(--text2); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .event-card { display: flex; gap: 14px; padding: 12px 0; border-bottom: 1px solid var(--border); align-items: flex-start; animation: fadeIn 0.3s ease; }
  .event-time { font-size: 11px; color: var(--text2); white-space: nowrap; padding-top: 2px; min-width: 48px; letter-spacing: 0.3px; }
  .event-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin-top: 5px; flex-shrink: 0; }
  .event-info { flex: 1; }
  .event-title { font-size: 13px; color: var(--text); margin-bottom: 3px; }
  .event-duration { font-size: 10px; color: var(--text2); }
  .no-events { text-align: center; color: var(--text2); font-size: 12px; padding: 60px 20px; line-height: 1.8; }
  .no-events .icon { font-size: 36px; margin-bottom: 12px; }
  .agenda-loading { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 12px; color: var(--text2); font-size: 11px; }
  .pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: pulse 1.2s ease-in-out infinite; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
  .chat-messages::-webkit-scrollbar { display: none; }
  .msg { max-width: 85%; animation: fadeIn 0.25s ease; }
  .msg.user { align-self: flex-end; }
  .msg.assistant { align-self: flex-start; }
  .msg-bubble { padding: 10px 14px; border-radius: 14px; font-size: 13px; line-height: 1.6; }
  .msg.user .msg-bubble { background: var(--accent2); color: var(--text); border-bottom-right-radius: 4px; }
  .msg.assistant .msg-bubble { background: var(--bg3); color: var(--text); border-bottom-left-radius: 4px; border: 1px solid var(--border); }
  .msg-time { font-size: 9px; color: var(--text3); margin-top: 4px; padding: 0 4px; }
  .msg.user .msg-time { text-align: right; }
  .typing-indicator { align-self: flex-start; background: var(--bg3); border: 1px solid var(--border); border-radius: 14px; border-bottom-left-radius: 4px; padding: 12px 16px; display: none; gap: 5px; align-items: center; }
  .typing-indicator.show { display: flex; }
  .typing-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text2); animation: typingBounce 1s infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.15s; }
  .typing-dot:nth-child(3) { animation-delay: 0.3s; }
  .input-area { padding: 12px 16px 16px; border-top: 1px solid var(--border); background: var(--bg); flex-shrink: 0; }
  .input-row { display: flex; gap: 10px; align-items: flex-end; }
  .text-input { flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; resize: none; outline: none; max-height: 100px; transition: border-color 0.2s; line-height: 1.5; }
  .text-input:focus { border-color: var(--accent2); }
  .text-input::placeholder { color: var(--text3); }
  .icon-btn { width: 42px; height: 42px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg3); color: var(--text2); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: all 0.2s; font-size: 16px; }
  .icon-btn:active { transform: scale(0.92); }
  .icon-btn.send { background: var(--accent2); border-color: var(--accent2); color: var(--text); }
  .icon-btn.recording { background: var(--red); border-color: var(--red); color: #fff; animation: recPulse 1s infinite; }
  .recording-bar { display: none; align-items: center; gap: 10px; padding: 8px 0 4px; color: var(--text2); font-size: 11px; }
  .recording-bar.show { display: flex; }
  .rec-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--red); animation: pulse 0.8s infinite; }
  .rec-timer { font-variant-numeric: tabular-nums; color: var(--accent); }
  .toast { position: fixed; top: calc(var(--safe-top) + 60px); left: 50%; transform: translateX(-50%) translateY(-10px); background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 10px 18px; border-radius: 20px; font-size: 12px; opacity: 0; transition: all 0.3s; white-space: nowrap; z-index: 100; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--green); color: #7bc49a; }
  .toast.error { border-color: var(--red); color: #e07070; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  @keyframes recPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(139,58,58,0.4); } 50% { box-shadow: 0 0 0 8px rgba(139,58,58,0); } }
  @keyframes typingBounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }
</style>
</head>
<body>

<div id="mainApp" style="display:flex; flex-direction:column; flex:1; overflow:hidden;">
  <div class="header">
    <div class="header-left">
      <div class="header-title">Agenda</div>
      <div class="header-date" id="headerDate">—</div>
    </div>
    <div class="tab-switcher">
      <button class="tab-btn active" onclick="switchTab('agenda')">Hoy</button>
      <button class="tab-btn" onclick="switchTab('chat')">Chat</button>
    </div>
  </div>

  <div class="view active" id="agendaView">
    <div class="agenda-scroll">
      <div class="agenda-loading" id="agendaLoading">
        <div class="pulse-dot"></div>
        <span>cargando agenda…</span>
      </div>
      <div id="eventsList" style="display:none;"></div>
    </div>
  </div>

  <div class="view" id="chatView">
    <div class="chat-messages" id="chatMessages">
      <div class="msg assistant">
        <div class="msg-bubble">Hola Dani 👋 Dime qué tienes que agendar o pregúntame lo que necesites.</div>
        <div class="msg-time">ahora</div>
      </div>
    </div>
    <div class="typing-indicator" id="typingIndicator">
      <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
    </div>
    <div class="input-area">
      <div class="recording-bar" id="recordingBar">
        <div class="rec-dot"></div>
        <span>Grabando…</span>
        <span class="rec-timer" id="recTimer">0:00</span>
      </div>
      <div class="input-row">
        <button class="icon-btn" id="micBtn" onclick="toggleRecording()">🎙</button>
        <textarea class="text-input" id="textInput" placeholder="Escribe o usa el micro…" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="icon-btn send" onclick="sendMessage()">↑</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const apiKey = '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';
const N8N_READ = 'https://danimoro997.app.n8n.cloud/webhook/leer-eventos';
const N8N_CREATE = 'https://danimoro997.app.n8n.cloud/webhook/crear-evento';

let conversationHistory = [];
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;
let recInterval = null;
let recSeconds = 0;

const SYSTEM_PROMPT = `Eres el asistente personal de Dani. Gestiona su agenda de forma natural y eficiente.

REGLAS:
1. Cuando Dani mencione un evento, extrae la info y responde con un JSON al final usando este formato exacto:
|||EVENT:{"summary":"título","start":"YYYY-MM-DDTHH:MM:SS","end":"YYYY-MM-DDTHH:MM:SS"}|||
2. Si falta hora o fecha, pregúntala de forma concisa.
3. La fecha de hoy es: ${new Date().toLocaleDateString('es-ES', {weekday:'long', year:'numeric', month:'long', day:'numeric'})}.
4. Sé muy breve. Máximo 2 frases + JSON si aplica.
5. Si NO hay evento que crear, responde normalmente sin JSON.
6. Confirma el evento de forma concisa: "✓ Agendado para el martes a las 10h".`;

window.addEventListener('load', () => {
  updateHeaderDate();
  loadTodayEvents();
});

function updateHeaderDate() {
  document.getElementById('headerDate').textContent = new Date().toLocaleDateString('es-ES', { weekday:'long', day:'numeric', month:'long' }).toUpperCase();
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0&&tab==='agenda')||(i===1&&tab==='chat')));
  document.getElementById('agendaView').classList.toggle('active', tab==='agenda');
  document.getElementById('chatView').classList.toggle('active', tab==='chat');
  if (tab==='agenda') loadTodayEvents();
}

async function loadTodayEvents() {
  document.getElementById('agendaLoading').style.display = 'flex';
  document.getElementById('eventsList').style.display = 'none';
  try {
    const res = await fetch(N8N_READ + '?date=' + new Date().toISOString().split('T')[0]);
    const data = await res.json();
    renderEvents(data.events || []);
  } catch(e) { renderEvents([]); }
}

function renderEvents(events) {
  document.getElementById('agendaLoading').style.display = 'none';
  const list = document.getElementById('eventsList');
  list.style.display = 'block';
  if (!events.length) {
    list.innerHTML = '<div class="no-events"><div class="icon">◯</div>Sin eventos hoy.<br><span style="color:var(--text3)">Usa el chat para agendar algo.</span></div>';
    return;
  }
  const sorted = events.sort((a,b) => (a.start?.dateTime||'').localeCompare(b.start?.dateTime||''));
  list.innerHTML = `<div class="day-header">${events.length} evento${events.length>1?'s':''} hoy</div>` +
    sorted.map(ev => {
      let timeStr = 'Todo el día', durStr = '';
      if (ev.start?.dateTime) {
        const s = new Date(ev.start.dateTime), e = new Date(ev.end?.dateTime||ev.start.dateTime);
        timeStr = s.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
        const dur = Math.round((e-s)/60000);
        durStr = dur>=60?`${Math.floor(dur/60)}h${dur%60?' '+dur%60+'min':''}`:dur+' min';
      }
      return `<div class="event-card">
        <div class="event-time">${timeStr}</div>
        <div class="event-dot"></div>
        <div class="event-info">
          <div class="event-title">${ev.summary||'Sin título'}</div>
          ${durStr?`<div class="event-duration">${durStr}</div>`:''}
        </div>
      </div>`;
    }).join('');
}

async function sendMessage(text) {
  const input = document.getElementById('textInput');
  const msg = text || input.value.trim();
  if (!msg) return;
  if (!text) { input.value = ''; autoResize(input); }
  addMessage('user', msg);
  conversationHistory.push({role:'user', content:msg});
  showTyping(true);
  try {
    const reply = await callClaude(conversationHistory);
    showTyping(false);
    const eventMatch = reply.match(/\|\|\|EVENT:(.*?)\|\|\|/s);
    const cleanReply = reply.replace(/\|\|\|EVENT:.*?\|\|\|/s,'').trim();
    addMessage('assistant', cleanReply);
    conversationHistory.push({role:'assistant', content:reply});
    if (eventMatch) {
      try { await createEvent(JSON.parse(eventMatch[1])); } catch(e) {}
    }
  } catch(e) {
    showTyping(false);
    addMessage('assistant','Error de conexión. Verifica tu API key.');
  }
}

async function callClaude(messages) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,system:SYSTEM_PROMPT,messages})
  });
  if (!res.ok) throw new Error('API '+res.status);
  return (await res.json()).content[0].text;
}

async function createEvent(eventData) {
  showToast('Creando evento…');
  try {
    await fetch(N8N_CREATE,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(eventData)});
    showToast('✓ Agendado en Google Calendar','success');
    setTimeout(loadTodayEvents,1500);
  } catch(e) { showToast('Error al agendar','error'); }
}

function addMessage(role, text) {
  const container = document.getElementById('chatMessages');
  const now = new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
  const div = document.createElement('div');
  div.className = 'msg '+role;
  div.innerHTML = `<div class="msg-bubble">${text.replace(/\n/g,'<br>')}</div><div class="msg-time">${now}</div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function showTyping(show) {
  document.getElementById('typingIndicator').classList.toggle('show',show);
  document.getElementById('chatMessages').scrollTop = 99999;
}

async function toggleRecording() {
  if (isRecording) { stopRecording(); return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t=>t.stop());
      await transcribeAudio(new Blob(audioChunks,{type:'audio/webm'}));
    };
    mediaRecorder.start();
    isRecording = true; recSeconds = 0;
    document.getElementById('micBtn').classList.add('recording');
    document.getElementById('micBtn').textContent = '⏹';
    document.getElementById('recordingBar').classList.add('show');
    recInterval = setInterval(()=>{
      recSeconds++;
      const m=Math.floor(recSeconds/60),s=recSeconds%60;
      document.getElementById('recTimer').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    },1000);
  } catch(e) { showToast('Sin acceso al micrófono','error'); }
}

function stopRecording() {
  if (mediaRecorder&&isRecording) {
    mediaRecorder.stop(); isRecording=false; clearInterval(recInterval);
    document.getElementById('micBtn').classList.remove('recording');
    document.getElementById('micBtn').textContent='🎙';
    document.getElementById('recordingBar').classList.remove('show');
  }
}

async function transcribeAudio(blob) {
  showToast('Transcribiendo…');
  try {
    const reader = new FileReader();
    reader.readAsDataURL(blob);
    reader.onloadend = async () => {
      const base64 = reader.result.split(',')[1];
      const res = await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:200,messages:[{role:'user',content:[
          {type:'text',text:'Transcribe exactamente lo que dice este audio en español. Devuelve SOLO la transcripción.'},
          {type:'document',source:{type:'base64',media_type:blob.type||'audio/webm',data:base64}}
        ]}]})
      });
      if (res.ok) {
        const transcription = (await res.json()).content[0].text.trim();
        document.getElementById('textInput').value = transcription;
        autoResize(document.getElementById('textInput'));
        showToast('✓ Transcrito');
        setTimeout(()=>sendMessage(),300);
      } else { useWebSpeech(); }
    };
  } catch(e) { useWebSpeech(); }
}

function useWebSpeech() {
  const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  if (!SR) { showToast('Escribe tu mensaje','error'); return; }
  const r = new SR(); r.lang='es-ES';
  r.onresult = e => {
    document.getElementById('textInput').value = e.results[0][0].transcript;
    autoResize(document.getElementById('textInput'));
    setTimeout(()=>sendMessage(),300);
  };
  r.start();
}

function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,100)+'px'; }

let toastTimeout;
function showToast(msg,type='') {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show'+(type?' '+type:'');
  clearTimeout(toastTimeout);
  toastTimeout=setTimeout(()=>t.className='toast',2800);
}
</script>
</body>
</html>
